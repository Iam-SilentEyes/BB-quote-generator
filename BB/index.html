 <div class="cont">

    <h4 id="author" style="height:1rem; margin-top:-1rem"></h4>
     <button id="button"> One more, bitch</button>

  </div>

 </div>

<script type="text/javascript">

const child = document.getElementById('quote');
const btn  = document.getElementById('button');
const author  = document.getElementById('author');


btn.addEventListener("click", todos);


   function todos() {

       fetch('https://breaking-bad-quotes.herokuapp.com/v1/quotes')
       .then( res => res.json())
       .then( data => {
 	          console.log(data[0].author, data[0].quote);
              child.innerHTML = data[0].quote ;
              author.innerHTML = data[0].author;
        })
       .catch( err => console.log(err));
 }
